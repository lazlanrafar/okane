<html>
  <body style="font-family: Arial, sans-serif; color: #111827; line-height: 1.6;">
    <h2>Workspace downgraded</h2>
    <p>Hi {{userName}},</p>
    <p>
      Your workspace <strong>{{workspaceName}}</strong> has been downgraded to the Starter plan because
      payment was not received during the grace period.
    </p>
    <p>
      Your data is still available. You can upgrade again at any time from billing settings.
    </p>
    <p>
      <a href="{{billingUrl}}">Open billing settings</a>
    </p>
  </body>
</html>
