<html>
  <body style="font-family: Arial, sans-serif; color: #111827; line-height: 1.6;">
    <h2>Payment overdue</h2>
    <p>Hi {{userName}},</p>
    <p>
      Your subscription for <strong>{{workspaceName}}</strong> became overdue on
      <strong>{{dueDate}}</strong>.
    </p>
    <p>
      Please complete payment within 7 days to keep your paid plan active. If payment is not received,
      your workspace will be downgraded to the Starter plan.
    </p>
    <p>
      <a href="{{billingUrl}}">Open billing settings</a>
    </p>
  </body>
</html>
